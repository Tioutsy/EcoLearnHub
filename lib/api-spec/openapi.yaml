        description:
          type: string
        categoryId:
          type: integer
        durationMinutes:
          type: integer
        priceUsd:
          type: number
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        isFeatured:
          type: boolean
        thumbnailUrl:
          type: ["string", "null"]
        previewVideoUrl:
          type: ["string", "null"]
        learningObjectives:
          type: array
          items:
            type: string
        includesCertificate:
          type: boolean

    CourseUpdate:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        durationMinutes:
          type: ["integer", "null"]
        priceUsd:
          type: ["number", "null"]
        level:
          type: ["string", "null"]
        isFeatured:
          type: ["boolean", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        previewVideoUrl:
          type: ["string", "null"]
        learningObjectives:
          type: array
