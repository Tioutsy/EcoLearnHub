            type: object
            required: [questionId, question, selectedOption, correctOption, isCorrect, options]
            properties:
              questionId:
                type: integer
              question:
                type: string
              selectedOption:
                type: integer
              correctOption:
                type: integer
              isCorrect:
                type: boolean
              correctExplanation:
                type: ["string", "null"]
              incorrectExplanation:
                type: ["string", "null"]
              practicalTakeaway:
                type: ["string", "null"]
              optionFeedback:
                type: array
                items:
                  type: ["string", "null"]
              options:
                type: array
                items:
                  type: string
              competencyArea:
                type: ["string", "null"]
              sourceCourseId:
                type: ["integer", "null"]
              learningOutcome:
                type: ["string", "null"]

