openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EcoLearn Mauritius API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: courses
  - name: categories
  - name: enrollments
  - name: progress
  - name: quizzes
  - name: certificates
  - name: companies
  - name: employees
  - name: assignments
  - name: reports
  - name: plans
  - name: subscriptions
  - name: dashboard
  - name: impact
  - name: blog
  - name: testimonials
  - name: leads
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── COURSES ──────────────────────────────────────────────────────────────────
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all published courses
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: featured
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a single course with lessons and objectives
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /courses/featured:
    get:
      operationId: getFeaturedCourses
      tags: [courses]
      summary: Get featured courses for the homepage
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  # ── CATEGORIES ────────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all course categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── ENROLLMENTS ───────────────────────────────────────────────────────────────
  /enrollments:
    get:
      operationId: listEnrollments
      tags: [enrollments]
      summary: List enrollments for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"
    post:
      operationId: createEnrollment
      tags: [enrollments]
      summary: Enroll in a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /enrollments/{id}:
    get:
      operationId: getEnrollment
      tags: [enrollments]
      summary: Get a single enrollment with progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentDetail"

  # ── PROGRESS ──────────────────────────────────────────────────────────────────
  /progress/{enrollmentId}:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get lesson-by-lesson progress for an enrollment
      parameters:
        - name: enrollmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LessonProgress"
    patch:
      operationId: updateProgress
      tags: [progress]
      summary: Mark a lesson complete / update progress
      parameters:
        - name: enrollmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonProgress"

  # ── QUIZZES ───────────────────────────────────────────────────────────────────
  /courses/{courseId}/quiz:
    get:
      operationId: getCourseQuiz
      tags: [quizzes]
      summary: Get quiz questions for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /courses/{courseId}/quiz/submit:
    post:
      operationId: submitQuiz
      tags: [quizzes]
      summary: Submit quiz answers
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  # ── COMMITMENTS ───────────────────────────────────────────────────────────────
  /courses/{courseId}/commitments:
    get:
      operationId: getCommitments
      tags: [commitments]
      summary: Get the current user's saved commitments for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitmentList"
    post:
      operationId: saveCommitments
      tags: [commitments]
      summary: Save the current user's commitments for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCommitmentsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitmentList"

  # ── PROGRESSION ───────────────────────────────────────────────────────────────
  /progression/points:
    get:
      operationId: getMyPoints
      tags: [progression]
      summary: Get the current user's total learning points
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsBreakdown"

  /progression/courses/{courseId}/summary:
    get:
      operationId: getCourseProgressSummary
      tags: [progression]
      summary: Get the current user's progression summary for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseProgressSummary"

  # ── CERTIFICATES ──────────────────────────────────────────────────────────────
  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      summary: List certificates for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /certificates/company/list:
    get:
      operationId: listCompanyCertificates
      tags: [certificates]
      summary: List all certificates issued across the company
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /certificates/{id}:
    get:
      operationId: getCertificate
      tags: [certificates]
      summary: Get a certificate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  /certificates/verify/{code}:
    get:
      operationId: verifyCertificate
      tags: [certificates]
      summary: Publicly verify a certificate by its unique code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  # ── LEARNING PATHS ────────────────────────────────────────────────────────────
  /learning-paths:
    get:
      operationId: listLearningPaths
      tags: [learning-paths]
      summary: List structured learning paths with the current user's progress
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningPath"

  /learning-paths/{slug}:
    get:
      operationId: getLearningPathDetails
      tags: [learning-paths]
      summary: Get detailed learning path with ordered courses and enrollment status
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningPathDetail"
        "404":
          description: Not Found

  # ── BADGES ────────────────────────────────────────────────────────────────────
  /badges:
    get:
      operationId: listAchievementBadges
      tags: [badges]
      summary: List achievement badges with the current user's earned status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AchievementBadge"

  /leaderboards:
    get:
      operationId: listLeaderboards
      tags: [leaderboards]
      summary: Company leaderboards (top learners, champions, courses, scores)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /challenges:
    get:
      operationId: listChallenges
      tags: [challenges]
      summary: Monthly sustainability challenges with the current user's participation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeListResponse"

  /challenges/{id}/join:
    post:
      operationId: joinChallenge
      tags: [challenges]
      summary: Join a challenge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
        "201":
          description: Joined

  /challenges/{id}/progress:
    post:
      operationId: logChallengeProgress
      tags: [challenges]
      summary: Log progress towards a challenge goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeProgressInput"
      responses:
        "200":
          description: OK

  # ── COMPLIANCE ────────────────────────────────────────────────────────────────
  /compliance/overview:
    get:
      operationId: getComplianceOverview
      tags: [compliance]
      summary: Training compliance dashboard data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceOverview"

  /compliance/assignments:
    post:
      operationId: assignCourse
      tags: [compliance]
      summary: Assign a course to employees or a whole department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignCourseInput"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignCourseResult"

  /compliance/reminders:
    get:
      operationId: listReminders
      tags: [compliance]
      summary: Recent training reminders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingReminder"
    post:
      operationId: sendReminder
      tags: [compliance]
      summary: Send a reminder or retraining notification to an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendReminderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingReminder"

  /compliance/employees/bulk-import:
    post:
      operationId: bulkImportEmployees
      tags: [compliance]
      summary: Bulk import employees from parsed spreadsheet rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportInput"
      responses:
        "201":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /compliance/run-retraining-scan:
    post:
      operationId: runRetrainingScan
      tags: [compliance]
      summary: Automatically generate retraining notices for all expired training
      responses:
        "201":
          description: Notices generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrainingScanResult"

  # ── ADMIN ─────────────────────────────────────────────────────────────────────
  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Platform-wide analytics for the super admin dashboard
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"
        "401":
          description: Authentication required
        "403":
          description: Super admin access required

  # ── LEADS ─────────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List captured leads (super admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
        "401":
          description: Authentication required
        "403":
          description: Super admin access required
    post:
      operationId: createLead
      tags: [leads]
      summary: Capture a lead from a trial signup, demo request, or proposal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadInput"
      responses:
        "201":
          description: Lead captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  # ── COMPANY ───────────────────────────────────────────────────────────────────
  /company:
    get:
      operationId: getMyCompany
      tags: [companies]
      summary: Get the current user's company profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateMyCompany
      tags: [companies]
      summary: Update company profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ── EMPLOYEES ─────────────────────────────────────────────────────────────────
  /company/employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees in the current user's company
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: addEmployee
      tags: [employees]
      summary: Add an employee to the company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /company/employees/{id}:
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: removeEmployee
      tags: [employees]
      summary: Remove an employee from the company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /company/employees/{id}/invite:
    post:
      operationId: createEmployeeInvitation
      tags: [employees]
      summary: Create an invitation link for an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeInvitation"

  /company/assignments:
    post:
      operationId: assignCompanyCourses
      tags: [assignments]
      summary: Assign one or several courses to employees or a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignCompanyCoursesInput"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignCourseResult"

  /company/lms-overview:
    get:
      operationId: getCompanyLmsOverview
      tags: [dashboard]
      summary: Get company learning-management overview
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyLmsOverview"

  /company/reports/training:
    get:
      operationId: getTrainingReport
      tags: [reports]
      summary: Get filterable company training report rows
      parameters:
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: department
          in: query
          schema:
            type: string
        - name: courseId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [all, not_started, in_progress, completed, overdue]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingReportRow"

  # ── PLANS ─────────────────────────────────────────────────────────────────────
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all subscription plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  # ── SUBSCRIPTIONS ─────────────────────────────────────────────────────────────
  /subscriptions/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscriptions]
      summary: Get the current company subscription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create a Stripe checkout session for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /subscriptions/portal:
    post:
      operationId: createCustomerPortalSession
      tags: [subscriptions]
      summary: Create a Stripe customer portal session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"

  # ── DASHBOARD ─────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get company training dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/employee-progress:
    get:
      operationId: getEmployeeProgress
      tags: [dashboard]
      summary: Get per-employee training progress for HR view
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeProgressRow"

  /dashboard/completion-trend:
    get:
      operationId: getCompletionTrend
      tags: [dashboard]
      summary: Monthly completion trend for the last 12 months
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /dashboard/department-participation:
    get:
      operationId: getDepartmentParticipation
      tags: [dashboard]
      summary: Training participation and completion by department
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentParticipation"

  # ── ENVIRONMENTAL IMPACT ──────────────────────────────────────────────────────
  /impact:
    get:
      operationId: getImpactMetrics
      tags: [impact]
      summary: Get environmental impact metrics for the company
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactMetrics"

  /impact/badges:
    get:
      operationId: listBadges
      tags: [impact]
      summary: List earned sustainability badges for the company
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /impact/department-breakdown:
    get:
      operationId: getDepartmentBreakdown
