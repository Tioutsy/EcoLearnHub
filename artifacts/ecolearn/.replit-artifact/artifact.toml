kind = "web"
previewPath = "/"
title = "EcoLearn Mauritius"
version = "1.0.0"
id = "artifacts/ecolearn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24777

[services.development]
run = "pnpm --filter @workspace/ecolearn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecolearn", "run", "build" ]
publicDir = "artifacts/ecolearn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24777"
BASE_PATH = "/"
